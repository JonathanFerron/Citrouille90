<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="600" viewBox="0 0 1200 600"
     xmlns="http://www.w3.org/2000/svg"
     version="1.1">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" 
            refX="10" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="black" />
    </marker>
  </defs>

  <!-- ===== BASE GEOMETRY LAYER ===== -->
  <g id="geometry">

    <!-- Case -->
    <rect x="150" y="300" width="900" height="120" 
          fill="#3b73b9" stroke="#2a4f80" stroke-width="3"/>
    <rect x="150" y="200" width="40" height="100" 
          fill="#3b73b9" stroke="#2a4f80" stroke-width="3"/>
    <rect x="1010" y="200" width="40" height="100" 
          fill="#3b73b9" stroke="#2a4f80" stroke-width="3"/>

    <!-- Plate -->
    <rect x="150" y="180" width="900" height="20" 
          fill="#cccccc" stroke="#666666" stroke-width="2"/>

    <!-- PCB -->
    <rect x="180" y="260" width="840" height="15" 
          fill="#d94841" stroke="#992d2a" stroke-width="2"/>

    <!-- Switch (deeper, sitting on PCB) -->
    <rect x="550" y="120" width="100" height="120" 
          fill="#f39c34" stroke="#b36a16" stroke-width="3"/>
    <rect x="585" y="90" width="30" height="30" 
          fill="#f39c34" stroke="#b36a16" stroke-width="3"/>

    <!-- Brass mounting post (female both ends) -->
    <rect x="585" y="260" width="30" height="120" 
          fill="#c9a227" stroke="#8c6e12" stroke-width="2"/>

    <!-- Bottom screw head popping out -->
    <rect x="575" y="380" width="50" height="20" 
          fill="#777777" stroke="#444444" stroke-width="2"/>

    <!-- Corner screws -->
    <circle cx="170" cy="190" r="8" fill="#777777" stroke="#444444" stroke-width="2"/>
    <circle cx="1030" cy="190" r="8" fill="#777777" stroke="#444444" stroke-width="2"/>

  </g>

  <!-- ===== LABELS & ARROWS LAYER ===== -->
  <g id="labels" font-family="Arial" font-size="28" fill="black" stroke="black" stroke-width="2">

    <!-- Screws in corners -->
    <text x="100" y="120">Screws in corners</text>
    <line x1="220" y1="130" x2="170" y2="182" marker-end="url(#arrow)" />

    <!-- Switch -->
    <text x="700" y="100">Switch</text>
    <line x1="700" y1="110" x2="600" y2="150" marker-end="url(#arrow)" />

    <!-- Plate -->
    <text x="1080" y="150">Plate</text>
    <line x1="1080" y1="160" x2="1000" y2="185" marker-end="url(#arrow)" />

    <!-- PCB -->
    <text x="250" y="240">PCB</text>
    <line x1="300" y1="245" x2="300" y2="260" marker-end="url(#arrow)" />

    <!-- Brass mounting post -->
    <text x="430" y="480">Brass mounting post (female both ends)</text>
    <line x1="650" y1="460" x2="600" y2="320" marker-end="url(#arrow)" />

    <!-- Case -->
    <text x="1000" y="480">Case</text>
    <line x1="1020" y1="460" x2="1000" y2="350" marker-end="url(#arrow)" />

  </g>

</svg>
